<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background: #f0f4f8;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 40px;
        }
        .form-card {
            background: #ffffff;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        h1 { color: #1a202c; font-size: 32px; letter-spacing: -1px; }
        .input-pill {
            background: #f7fafc;
            border: 2px solid transparent;
            border-radius: 100px;
            padding: 15px 25px;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .input-pill:focus {
            background: #fff;
            border-color: #6366f1;
            outline: none;
        }
        .btn-grad {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 100px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Tantraz.</h1>
        <p style="margin-bottom: 25px; color: #718096;">Join the 2026 tech wave.</p>
        <input type="text" class="input-pill" placeholder="Full Name">
        <input type="email" class="input-pill" placeholder="Email Address">
        <select class="input-pill">
            <option>Select Category</option>
            <option>Solo</option>
            <option>Squad</option>
        </select>
        <button class="btn-grad">Send Registration</button>
    </div>
</body>
</html>
