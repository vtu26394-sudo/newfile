<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            flex: 1;
            background: #1a202c;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }
        .main-content {
            flex: 2;
            background: white;
            padding: 80px;
            overflow-y: auto;
        }
        .step-num {
            background: #4e73df;
            width: 30px;
            height: 30px;
            display: inline-block;
            text-align: center;
            border-radius: 50%;
            line-height: 30px;
            margin-right: 10px;
        }
        .form-row { margin-bottom: 25px; }
        label { display: block; text-transform: uppercase; font-size: 12px; font-weight: bold; color: #4a5568; margin-bottom: 8px; }
        input[type="text"] {
            border: none;
            border-bottom: 2px solid #e2e8f0;
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
        }
        input[type="text"]:focus { outline: none; border-bottom-color: #4e73df; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Tantraz <br>Registration</h1>
        <p>Complete the profile to access the technical symposium.</p>
    </div>
    <div class="main-content">
        <div class="form-row">
            <label>01 Identification</label>
            <input type="text" placeholder="Your Legal Name">
        </div>
        <div class="form-row">
            <label>02 Digital Contact</label>
            <input type="text" placeholder="Email Address">
        </div>
        <div class="form-row">
            <label>03 Participation</label>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <label><input type="radio" name="p"> Individual</label>
                <label><input type="radio" name="p"> Team</label>
            </div>
        </div>
        <button style="background: #1a202c; color: white; padding: 15px 40px; border: none; cursor: pointer;">SUBMIT FORM</button>
    </div>
</body>
</html>
