<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBank | Digital Assets</title>
    <style>
        body {
            margin: 0;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .balance { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .btn-transfer {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #4e73df;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-transfer:hover { background: #4e73df; color: #fff; }
    </style>
</head>
<body>
    <div class="glass-card">
        <p>Current Balance</p>
        <div class="balance">$24,500.80</div>
        <div class="stats">
            <div><span>Income</span><br><strong>+$4,200</strong></div>
            <div><span>Expenses</span><br><strong>-$1,100</strong></div>
        </div>
        <button class="btn-transfer">Send Money</button>
    </div>
</body>
</html>
