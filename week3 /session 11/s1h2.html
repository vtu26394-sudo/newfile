<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio X | Portfolio</title>
    <style>
        body { background: #000; color: #fff; padding: 20px; font-family: sans-serif; }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 200px;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .box {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: transform 0.3s;
        }

        .box:hover { transform: scale(0.98); background: #222; }
        
        /* Grid Assignments */
        .large { grid-column: span 2; grid-row: span 2; background: #6366f1; }
        .tall { grid-row: span 2; background: #ec4899; }
        .wide { grid-column: span 2; }

        h2 { font-size: 1.5rem; margin-bottom: 5px; }
        p { opacity: 0.7; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bento-grid">
        <div class="box large">
            <h2>Our Vision</h2>
            <p>Creating digital experiences that matter.</p>
        </div>
        <div class="box">
            <h2>UI/UX</h2>
        </div>
        <div class="box tall">
            <h2>Active Projects</h2>
            <p>12 Worldwide</p>
        </div>
        <div class="box wide">
            <h2>Let's Collaborate</h2>
            <p>hello@studiox.com</p>
        </div>
        <div class="box">
            <h2>Awards</h2>
        </div>
    </div>
</body>
</html>
